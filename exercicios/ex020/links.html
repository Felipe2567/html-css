<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
                font-family: Arial, Helvetica, sans-serif;
            }
            a{
                color: red;
                text-decoration: none;
                font-weight: bold;
            }
            a:visited{
                color: darkred;
            }
            a:hover{
                text-decoration: underline;
                color: black;
            }
            a:active{
                color: yellow;
            }
            a::before{
                content: '➞';
            }
        
        .especial{
        background-color: rgb(231, 137, 137);
        }
            a::after{
                content: '🠔' ;
        
            }
            .especial::before{
                content: '☛';
            }
            .especial::after{
                content: '☚';
            }
    </style>
  
</head>
<body>
    <h1>Personalizando Links   </h1>
    <ul>
        <li><a href="https://open.spotify.com/intl-pt/" target="_blank" rel="external">Spotify</a></li>
        <li><a href="https://www.youtube.com" target="_blank" rel="external" class="especial">Youtube</a></li>
        <li><a href="https://claude.ai" target="_blank" rel="external">Claude.IA</a></li>
    </ul>
</body>
</html>
